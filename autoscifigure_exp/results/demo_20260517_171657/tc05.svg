<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 860" width="900" height="860">
<style>
.fig-node-label { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #1e293b; text-anchor: middle; dominant-baseline: central; pointer-events: none; }
.fig-edge-label { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #475569; text-anchor: middle; dominant-baseline: central; }
.fig-edge-label-bg { fill: #ffffff; fill-opacity: 0.85; }
.fig-group-label { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #64748b; font-weight: bold; }
.fig-title { font-family: Arial, Helvetica, sans-serif; font-size: 20px; fill: #0f172a; text-anchor: middle; font-weight: bold; }
.fig-legend-text { font-family: Arial, Helvetica, sans-serif; font-size: 10px; fill: #475569; }
</style>
<defs>
<marker id="arrow-forward" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth"><polygon points="0 0, 10 3.5, 0 7" fill="#475569"/></marker>
<marker id="arrow-backward" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto" markerUnits="strokeWidth"><polygon points="10 0, 0 3.5, 10 7" fill="#475569"/></marker>
<marker id="arrow-dashed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
</defs>
<text x="450.0" y="55.0" class="fig-title">Neural Network Training Loop</text>
<!-- edge: start -> load -->
<g id="edge-start-load">
<path d="M 110.0 150.0 L 110.0 180.0" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="none" marker-start="none" marker-end="url(#arrow-forward)"/>
</g>
<!-- edge: load -> forward -->
<g id="edge-load-forward">
<path d="M 110.0 230.0 L 110.0 260.0" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="none" marker-start="none" marker-end="url(#arrow-forward)"/>
</g>
<!-- edge: forward -> loss -->
<g id="edge-forward-loss">
<path d="M 110.0 310.0 L 110.0 340.0" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="none" marker-start="none" marker-end="url(#arrow-forward)"/>
</g>
<!-- edge: loss -> backward -->
<g id="edge-loss-backward">
<path d="M 110.0 390.0 L 110.0 420.0" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="none" marker-start="none" marker-end="url(#arrow-forward)"/>
</g>
<!-- edge: backward -> update -->
<g id="edge-backward-update">
<path d="M 110.0 470.0 L 110.0 500.0" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="none" marker-start="none" marker-end="url(#arrow-forward)"/>
<rect x="73.5" y="476.0" width="73" height="18" class="fig-edge-label-bg" rx="3"/>
<text x="110.0" y="485.0" class="fig-edge-label">gradients</text>
</g>
<!-- edge: update -> check -->
<g id="edge-update-check">
<path d="M 110.0 550.0 L 110.0 590.0" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="none" marker-start="none" marker-end="url(#arrow-forward)"/>
</g>
<!-- edge: check -> load -->
<g id="edge-check-load">
<path d="M 110.0 590.0 L 110.0 230.0" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8,4" marker-start="none" marker-end="url(#arrow-dashed)"/>
<rect x="52.5" y="401.0" width="115" height="18" class="fig-edge-label-bg" rx="3"/>
<text x="110.0" y="410.0" class="fig-edge-label">No — next epoch</text>
</g>
<!-- edge: check -> end -->
<g id="edge-check-end">
<path d="M 110.0 650.0 L 110.0 690.0" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="none" marker-start="none" marker-end="url(#arrow-forward)"/>
<rect x="90.0" y="661.0" width="40" height="18" class="fig-edge-label-bg" rx="3"/>
<text x="110.0" y="670.0" class="fig-edge-label">Yes</text>
</g>
<!-- node: start -->
<g id="node-start">
<rect x="60" y="110" width="100" height="40" rx="8" ry="8" fill="#e8f4fd" stroke="#1e40af" stroke-width="2"/>
<text x="110.0" y="130.0" class="fig-node-label">Start</text>
</g>
<!-- node: load -->
<g id="node-load">
<rect x="60" y="180" width="100" height="50" rx="0" ry="0" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
<text x="110.0" y="205.0" class="fig-node-label">Load
Mini-Batch</text>
</g>
<!-- node: forward -->
<g id="node-forward">
<rect x="60" y="260" width="100" height="50" rx="0" ry="0" fill="#dcfce7" stroke="#1e40af" stroke-width="2"/>
<text x="110.0" y="285.0" class="fig-node-label">Forward
Pass</text>
</g>
<!-- node: loss -->
<g id="node-loss">
<rect x="60" y="340" width="100" height="50" rx="0" ry="0" fill="#fef3c7" stroke="#1e40af" stroke-width="2"/>
<text x="110.0" y="365.0" class="fig-node-label">Compute
Loss</text>
</g>
<!-- node: backward -->
<g id="node-backward">
<rect x="60" y="420" width="100" height="50" rx="0" ry="0" fill="#f3e8ff" stroke="#1e40af" stroke-width="2"/>
<text x="110.0" y="445.0" class="fig-node-label">Backward
Pass</text>
</g>
<!-- node: update -->
<g id="node-update">
<rect x="60" y="500" width="100" height="50" rx="0" ry="0" fill="#e0e7ff" stroke="#1e40af" stroke-width="2"/>
<text x="110.0" y="525.0" class="fig-node-label">Update
Weights</text>
</g>
<!-- node: check -->
<g id="node-check">
<polygon points="110.0,590 150,620.0 110.0,650 70,620.0" fill="#fef2f2" stroke="#1e40af" stroke-width="2"/>
<text x="110.0" y="620.0" class="fig-node-label">Converged?</text>
</g>
<!-- node: end -->
<g id="node-end">
<rect x="60" y="690" width="100" height="40" rx="8" ry="8" fill="#e8f4fd" stroke="#1e40af" stroke-width="2"/>
<text x="110.0" y="710.0" class="fig-node-label">End</text>
</g>
<g id="legend">
<rect x="250.0" y="829" width="18" height="12" rx="0" ry="0" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
<text x="272.0" y="835" class="fig-legend-text">Box</text>
<rect x="312.0" y="829" width="18" height="12" rx="8" ry="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
<text x="334.0" y="835" class="fig-legend-text">Rounded</text>
<path d="M 374.0 837 L 374.0 833 A 9.0 8 0 0 0 392.0 833 L 392.0 837 Z" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
<ellipse cx="383.0" cy="837" rx="9.0" ry="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
<path d="M 374.0 833 A 9.0 8 0 0 0 392.0 833" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,3"/>
<path d="M 374.0 837 A 9.0 8 0 0 0 392.0 837" fill="none" stroke="#94a3b8" stroke-width="2"/>
<text x="396.0" y="835" class="fig-legend-text">Cylinder</text>
<polygon points="445.0,829 454.0,835.0 445.0,841 436.0,835.0" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
<text x="458.0" y="835" class="fig-legend-text">Diamond</text>
<ellipse cx="507.0" cy="835.0" rx="9.0" ry="6.0" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
<text x="520.0" y="835" class="fig-legend-text">Circle</text>
<polygon points="562.7,829 578.0,829 575.3,841 560.0,841" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
<text x="582.0" y="835" class="fig-legend-text">Para.</text>
<polygon points="631.00,829.00 632.41,833.06 636.71,833.15 633.28,835.74 634.53,839.85 631.00,837.40 627.47,839.85 628.72,835.74 625.29,833.15 629.59,833.06" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
<text x="644.0" y="835" class="fig-legend-text">Star</text>
</g>
</svg>