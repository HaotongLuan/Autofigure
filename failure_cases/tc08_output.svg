<rect x="547.2777777777778" y="241.0" width="66" height="18" class="fig-edge-label-bg" rx="3"/>
<text x="580.2777777777778" y="250.0" class="fig-edge-label">Rejected</text>
</g>
<!-- node: n1 -->
