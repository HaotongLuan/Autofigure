<path d="M 419.0 677 L 419.0 673 A 9.0 8 0 0 0 437.0 673 L 437.0 677 Z" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
<ellipse cx="428.0" cy="677" rx="9.0" ry="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
<path d="M 419.0 673 A 9.0 8 0 0 0 437.0 673" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,3"/>
