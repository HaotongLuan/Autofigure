<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 990 700" width="990" height="700">
<style>
.fig-node-label { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #1e293b; text-anchor: middle; dominant-baseline: central; pointer-events: none; }
.fig-edge-label { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #475569; text-anchor: middle; dominant-baseline: central; }
.fig-edge-label-bg { fill: #ffffff; fill-opacity: 0.85; }
.fig-group-label { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #64748b; font-weight: bold; }
.fig-title { font-family: Arial, Helvetica, sans-serif; font-size: 20px; fill: #0f172a; text-anchor: middle; font-weight: bold; }
.fig-legend-text { font-family: Arial, Helvetica, sans-serif; font-size: 10px; fill: #475569; }
</style>
<defs>
<marker id="arrow-forward" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth"><polygon points="0 0, 10 3.5, 0 7" fill="#475569"/></marker>
<marker id="arrow-backward" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto" markerUnits="strokeWidth"><polygon points="10 0, 0 3.5, 10 7" fill="#475569"/></marker>
<marker id="arrow-dashed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
</defs>
<text x="495.0" y="55.0" class="fig-title">Computational Drug Discovery Pipeline</text>
<!-- group: Discovery Phase -->
<g id="group-discovery-phase">
<rect x="60" y="110" width="860" height="115" rx="12" fill="#eff6ff" fill-opacity="0.4" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="8,4"/>
<text x="72" y="128" class="fig-group-label">Discovery Phase</text>
</g>
<!-- group: Clinical Development Phase -->
<g id="group-clinical-development-phase">
<rect x="60" y="290" width="870" height="115" rx="12" fill="#fef2f2" fill-opacity="0.4" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="8,4"/>
<text x="72" y="308" class="fig-group-label">Clinical Development Phase</text>
</g>
<!-- edge: n1 -> n2 -->
<g id="edge-n1-n2">
<path d="M 195.0 165.0 L 245.0 165.0" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="none" marker-start="none" marker-end="url(#arrow-forward)"/>
</g>
<!-- edge: n2 -> n3 -->
<g id="edge-n2-n3">
<path d="M 385.0 165.0 L 435.0 165.0" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="none" marker-start="none" marker-end="url(#arrow-forward)"/>
</g>
<!-- edge: n3 -> n4 -->
<g id="edge-n3-n4">
<path d="M 565.0 165.0 L 615.0 165.0" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="none" marker-start="none" marker-end="url(#arrow-forward)"/>
</g>
