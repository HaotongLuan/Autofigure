<polygon points="676.00,669.00 677.41,673.06 681.71,673.15 678.28,675.74 679.53,679.85 676.00,677.40 672.47,679.85 673.72,675.74 670.29,673.15 674.59,673.06" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
